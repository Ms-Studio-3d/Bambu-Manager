name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Setup Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Accept licenses and install required SDK packages
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Run unit tests
        run: gradle --no-daemon testDebugUnitTest

      - name: Run Android lint
        run: gradle --no-daemon lintDebug

      - name: Build debug APK
        run: gradle --no-daemon assembleDebug

      - name: Build release APK
        run: gradle --no-daemon assembleRelease

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: bambu-manager-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: bambu-manager-release-apk
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          if-no-files-found: error
